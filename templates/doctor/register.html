{% extends "base.html" %}

{% block title %}Doctor Registration{% endblock %}

{% block content %}
<div class="auth-container">
    <div class="auth-card">
        <div class="auth-header">
            <i class="fas fa-user-md"></i>
            <h2>Doctor Registration</h2>
            <p>Join our medical team</p>
        </div>
        
        <form method="POST" action="{{ url_for('doctor_register') }}" class="auth-form">
            <div class="form-group">
                <label for="name"><i class="fas fa-user"></i> Full Name</label>
                <input type="text" name="name" id="name" required placeholder="Dr. John Smith">
            </div>
            
            <div class="form-group">
                <label for="email"><i class="fas fa-envelope"></i> Email</label>
                <input type="email" name="email" id="email" required placeholder="doctor@hospital.com">
            </div>
            
            <div class="form-group">
                <label for="specialization"><i class="fas fa-stethoscope"></i> Specialization</label>
                <select name="specialization" id="specialization" required>
                    <option value="">Select Specialization</option>
                    <option value="Cardiology">Cardiology</option>
                    <option value="Dermatology">Dermatology</option>
                    <option value="Pediatrics">Pediatrics</option>
                    <option value="Neurology">Neurology</option>
                    <option value="Orthopedics">Orthopedics</option>
                    <option value="General Medicine">General Medicine</option>
                    <option value="ENT">ENT</option>
                    <option value="Gynecology">Gynecology</option>
                    <option value="Psychiatry">Psychiatry</option>
                    <option value="Dental">Dental</option>
                </select>
            </div>
            
            <div class="form-row">
                <div class="form-group">
                    <label for="experience"><i class="fas fa-briefcase"></i> Experience (years)</label>
                    <input type="number" name="experience" id="experience" required placeholder="10" min="0" max="50">
                </div>
                
                <div class="form-group">
                    <label for="phone"><i class="fas fa-phone"></i> Phone</label>
                    <input type="tel" name="phone" id="phone" required placeholder="1234567890">
                </div>
            </div>
            
            <div class="form-group">
                <label for="available_slots"><i class="fas fa-clock"></i> Available Slots</label>
                <input type="text" name="available_slots" id="available_slots" required placeholder="Mon-Fri: 9AM-5PM">
                <small class="form-text">Example: Mon-Fri: 9AM-5PM, Sat: 10AM-2PM</small>
            </div>
            
            <div class="form-group">
                <label for="password"><i class="fas fa-lock"></i> Password</label>
                <input type="password" name="password" id="password" required placeholder="Create password">
            </div>
            
            <button type="submit" class="btn btn-primary btn-block">
                <i class="fas fa-user-md"></i> Register as Doctor
            </button>
        </form>
        
        <div class="auth-footer">
            <p>Already have an account? <a href="{{ url_for('doctor_login') }}">Login here</a></p>
            <p>Patient? <a href="{{ url_for('register') }}">Register as Patient</a></p>
        </div>
    </div>
</div>

<style>
.form-text {
    display: block;
    margin-top: 0.25rem;
    font-size: 0.875rem;
    color: var(--gray-600);
}
</style>
{% endblock %}
