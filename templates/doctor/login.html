{% extends "base.html" %}

{% block title %}Doctor Login{% endblock %}

{% block content %}
<div class="auth-container">
    <div class="auth-card">
        <div class="auth-header">
            <i class="fas fa-user-md"></i>
            <h2>Doctor Login</h2>
            <p>Access your doctor dashboard</p>
        </div>
        
        <form method="POST" action="{{ url_for('doctor_login') }}" class="auth-form">
            <div class="form-group">
                <label for="email"><i class="fas fa-envelope"></i> Email</label>
                <input type="email" name="email" id="email" required placeholder="doctor@hospital.com">
            </div>
            
            <div class="form-group">
                <label for="password"><i class="fas fa-lock"></i> Password</label>
                <input type="password" name="password" id="password" required placeholder="Enter password">
            </div>
            
            <button type="submit" class="btn btn-primary btn-block">
                <i class="fas fa-sign-in-alt"></i> Login
            </button>
        </form>
        
        <div class="auth-footer">
            <p>Don't have an account? <a href="{{ url_for('doctor_register') }}">Register here</a></p>
            <p>Patient? <a href="{{ url_for('login') }}">Login as Patient</a></p>
        </div>
    </div>
</div>
{% endblock %}
