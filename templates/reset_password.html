{% extends "base.html" %}
{% block title %}Reset Password{% endblock %}
{% block content %}
<div class="auth-container">
    <div class="auth-card">
        <div class="auth-header">
            <i class="fas fa-lock"></i>
            <h2>Set New Password</h2>
            <p>Create a strong new password</p>
        </div>
        <form method="POST" class="auth-form">
            <div class="form-group">
                <label for="password"><i class="fas fa-lock"></i> New Password</label>
                <input type="password" name="password" id="password" required placeholder="Enter new password" minlength="6">
            </div>
            <div class="form-group">
                <label for="confirm_password"><i class="fas fa-lock"></i> Confirm Password</label>
                <input type="password" name="confirm_password" id="confirm_password" required placeholder="Confirm new password">
            </div>
            <button type="submit" class="btn btn-primary btn-block">
                <i class="fas fa-check"></i> Update Password
            </button>
        </form>
    </div>
</div>
{% endblock %}
