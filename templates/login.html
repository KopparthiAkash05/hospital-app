{% extends "base.html" %}

{% block title %}Login - Smart Hospital{% endblock %}

{% block content %}
<div class="auth-container">
    <div class="auth-card">
        <div class="auth-header">
            <i class="fas fa-sign-in-alt"></i>
            <h2>Login to Your Account</h2>
            <p>Access your hospital dashboard</p>
        </div>
        
        <form method="POST" action="{{ url_for('login') }}" class="auth-form">
            <div class="form-group">
                <label for="email"><i class="fas fa-envelope"></i> Email</label>
                <input type="email" name="email" id="email" required placeholder="Enter your email">
            </div>
            
            <div class="form-group">
                <label for="password"><i class="fas fa-lock"></i> Password</label>
                <input type="password" name="password" id="password" required placeholder="Enter your password">
            </div>
            
            <button type="submit" class="btn btn-primary btn-block">
                <i class="fas fa-sign-in-alt"></i> Login
            </button>
        </form>
        
        <div class="auth-footer">
            <p><a href="{{ url_for('forgot_password') }}" style="color: var(--primary-color);">Forgot Password?</a></p>
            <p>Don't have an account? <a href="{{ url_for('register') }}">Register as Patient</a></p>
            <p>Are you a doctor? <a href="{{ url_for('doctor_login') }}">Login here</a></p>
        </div>
    </div>
</div>
{% endblock %}
